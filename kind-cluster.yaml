# All host traffic enters through the ingress-nginx controller on the
# control-plane node; services are routed by hostname (*.localhost).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80  # ingress-nginx controller
        hostPort: 80
        protocol: TCP
  - role: worker
  - role: worker
